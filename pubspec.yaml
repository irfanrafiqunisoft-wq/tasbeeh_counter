name: tasbeeh_counter
description: A custom Tasbeeh (Zikr) tracker app with targets, history, reminders, and AdMob ads.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.1.0
  vibration: ^2.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_local_notifications: 18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
